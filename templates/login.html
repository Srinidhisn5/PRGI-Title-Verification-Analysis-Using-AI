<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>User Login</title>

    <style>
        body {
            margin: 0;
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg,#0f172a,#020617);
            color: #e5e7eb;
        }

        /* Header */
        .top-title {
            text-align: center;
            margin-top: 40px;
            font-size: 22px;
            font-weight: 700;
            color: #e5e7eb;
            line-height: 1.4;
        }

        .top-title span {
            display: block;
            font-size: 14px;
            color: #94a3b8;
            font-weight: 500;
        }

        /* Login Box */
        .login-container {
            max-width: 400px;
            margin: 60px auto;
            background: #111827;
            padding: 35px;
            border-radius: 16px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.7);
            animation: fadeUp 0.5s ease;
        }

        .login-container h2 {
            text-align: center;
            margin-bottom: 25px;
            color: #38bdf8;
            font-weight: 800;
        }

        /* Inputs */
        .input-field {
            width: 100%;
            padding: 12px;
            margin-bottom: 15px;
            border-radius: 10px;
            border: 1px solid #475569;
            background: #020617;
            color: white;
            outline: none;
            transition: 0.2s;
        }

        .input-field:focus {
            border-color: #38bdf8;
            box-shadow: 0 0 0 2px rgba(56,189,248,0.2);
        }

        /* Button */
        .login-btn {
            width: 100%;
            padding: 12px;
            background: #2563eb;
            border: none;
            border-radius: 10px;
            color: white;
            font-weight: bold;
            cursor: pointer;
            transition: 0.2s;
        }

        .login-btn:hover {
            background: #1d4ed8;
            transform: translateY(-2px);
        }

        .login-btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        /* Register link */
        .register-link {
            text-align: center;
            margin-top: 15px;
        }

        .register-link a {
            color: #38bdf8;
            text-decoration: none;
            font-weight: 600;
        }

        .register-link a:hover {
            text-decoration: underline;
        }

        /* Animation */
        @keyframes fadeUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
    </style>
</head>

<body>

<div class="top-title">
    🇮🇳 Government of India
    <span>Press Registrar General of India</span>
</div>

<div class="login-container">

    <h2>🔐 User Login</h2>

    <form method="POST" action="/user/login">

        <input type="email" name="email" placeholder="Enter your email"
               class="input-field" required>

        <input type="password" name="password" placeholder="Enter your password"
               class="input-field" required>

        <button type="submit" class="login-btn">
            Login
        </button>

    </form>

    <div class="register-link">
        Don't have an account?
        <a href="/register_page">Register</a>
    </div>

</div>

<!-- Loading UX -->
<script>
document.querySelector("form").addEventListener("submit", function() {
    const btn = this.querySelector("button");
    btn.innerText = "Please wait...";
    btn.disabled = true;
});
</script>

</body>
</html>
