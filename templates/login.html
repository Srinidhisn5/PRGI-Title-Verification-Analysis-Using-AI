<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>User Login</title>

<style>
body {
    margin: 0;
    font-family: 'Inter', sans-serif;
    background: linear-gradient(135deg,#0f172a,#020617);
    color: #e5e7eb;
}

.top-title {
    text-align: center;
    margin-top: 40px;
    font-size: 22px;
    font-weight: 700;
}

.top-title span {
    display: block;
    font-size: 14px;
    color: #94a3b8;
}

.subtitle {
    text-align: center;
    color: #94a3b8;
    font-size: 12px;
    margin-top: 5px;
}

.login-container {
    max-width: 400px;
    margin: 60px auto;
    background: #111827;
    padding: 35px;
    border-radius: 16px;
    box-shadow: 0 20px 50px rgba(0,0,0,0.7);
}

h2 {
    text-align: center;
    color: #38bdf8;
}

.input-field {
    width: 100%;
    padding: 12px;
    margin-bottom: 15px;
    border-radius: 10px;
    border: 1px solid #475569;
    background: #020617;
    color: white;
}

.login-btn {
    width: 100%;
    padding: 12px;
    background: #2563eb;
    border: none;
    border-radius: 10px;
    color: white;
    font-weight: bold;
    cursor: pointer;
}

.login-btn:hover {
    background: #1d4ed8;
}

.divider {
    text-align: center;
    margin: 20px 0;
    color: #94a3b8;
}

.google-btn {
    width: 100%;
    padding: 12px;
    background: white;
    color: black;
    border: none;
    border-radius: 10px;
    font-weight: bold;
    cursor: pointer;
}

.google-btn:hover {
    background: #e5e7eb;
}

.register-link {
    text-align: center;
    margin-top: 15px;
}

.register-link a {
    color: #38bdf8;
    text-decoration: none;
}

#loginError {
    display: none;
    text-align: center;
    margin-bottom: 10px;
    color: #ef4444;
    font-size: 14px;
}
</style>
</head>

<body>

<div class="top-title">
🇮🇳 Government of India
<span>Press Registrar General of India</span>
</div>

<p class="subtitle">Secure Title Verification Portal</p>

<div class="login-container">

<h2>🔐 User Login</h2>

<div id="loginError"></div>

<!-- NORMAL LOGIN -->
<form method="POST" action="/user/login">
    <input type="email" name="email"
           placeholder="Enter your email"
           class="input-field"
           required>

    <input type="password" name="password"
           placeholder="Enter your password"
           class="input-field"
           required>
    <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
    <button type="submit" class="login-btn">
        Login
    </button>
</form>

<div class="divider">OR</div>

<!-- GOOGLE LOGIN -->
<button onclick="googleLogin()" class="google-btn" id="googleBtn">
    Continue with Google
</button>

<div class="register-link">
    Don't have an account?
    <a href="/register_page">Register</a>
</div>

</div>

<!-- FORM LOADING -->
<script>
document.querySelector("form").addEventListener("submit", function() {
    const btn = this.querySelector("button");
    btn.innerText = "Please wait...";
    btn.disabled = true;
});
</script>

<!-- 🔥 FIREBASE GOOGLE LOGIN -->
<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getAuth, GoogleAuthProvider, signInWithPopup } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

const firebaseConfig = {
  apiKey: "AIzaSyBoqWhRWTfI5_wKw7oDddWfHCq6ZIsRDKw",
  authDomain: "prgi-login.firebaseapp.com",
  projectId: "prgi-login",
  storageBucket: "prgi-login.firebasestorage.app",
  messagingSenderId: "958114305004",
  appId: "1:958114305004:web:8570c1a72c79d2c12466c9"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const provider = new GoogleAuthProvider();

window.googleLogin = async function () {

    const btn = document.getElementById("googleBtn");
    const errorBox = document.getElementById("loginError");

    btn.disabled = true;
    btn.innerText = "Connecting...";

    try {
        const result = await signInWithPopup(auth, provider);
        const user = result.user;

        // ✅ IMPORTANT: GET TOKEN
        const idToken = await user.getIdToken();

        const res = await fetch("/firebase-login", {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify({ token: idToken })
        });

        const data = await res.json();

        if (data.success) {
            window.location.href = "/submit_form";
        } else {
            throw new Error("Login failed");
        }

    } catch (err) {
        console.error(err);

        errorBox.style.display = "block";
        errorBox.innerText = "Google login failed. Please try again.";

        btn.disabled = false;
        btn.innerText = "Continue with Google";
    }
};

</script>

</body>
</html>
