<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>User Register</title>

    <style>
        body {
            margin: 0;
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg,#0f172a,#020617);
            color: #e5e7eb;
        }

        .top-title {
            text-align: center;
            margin-top: 40px;
            font-size: 22px;
            font-weight: 700;
        }

        .top-title span {
            display: block;
            font-size: 14px;
            color: #94a3b8;
        }

        .subtitle {
            text-align: center;
            color: #94a3b8;
            font-size: 12px;
        }

        .register-container {
            max-width: 420px;
            margin: 60px auto;
            background: #111827;
            padding: 35px;
            border-radius: 16px;
        }

        .register-container h2 {
            text-align: center;
            color: #38bdf8;
        }

        #registerError {
            display: none;
            color: #ef4444;
            text-align: center;
            margin-bottom: 10px;
        }

        .input-field {
            width: 100%;
            padding: 12px;
            margin-bottom: 15px;
            border-radius: 10px;
            border: 1px solid #475569;
            background: #020617;
            color: white;
        }

        .register-btn {
            width: 100%;
            padding: 12px;
            background: #2563eb;
            border: none;
            border-radius: 10px;
            color: white;
            font-weight: bold;
            cursor: pointer;
        }

        .login-link {
            text-align: center;
            margin-top: 15px;
        }
    </style>
</head>

<body>

<div class="top-title">
    🇮🇳 Government of India
    <span>Press Registrar General of India</span>
</div>

<p class="subtitle">Secure Registration Portal</p>

<div class="register-container">

    <h2>📝 Create Account</h2>

    <div id="registerError"></div>

    <!-- ✅ SINGLE CLEAN FORM -->
    <form method="POST" action="/user/register" id="registerForm">

        <!-- ✅ CSRF FIX -->
        <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">

        <input type="text" name="name"
               placeholder="Enter your name"
               class="input-field"
               required>

        <input type="email" name="email"
               placeholder="Enter your email"
               class="input-field"
               required>

        <input type="password" name="password"
               placeholder="Create password"
               class="input-field"
               required minlength="6">

        <button type="submit" class="register-btn">
            Register
        </button>

    </form>

    <div class="login-link">
        Already have an account?
        <a href="/login_page">Login</a>
    </div>

</div>

<script>
const form = document.getElementById("registerForm");
const errorBox = document.getElementById("registerError");

form.addEventListener("submit", function(e) {

    const emailInput = form.querySelector('input[name="email"]');
    const passwordInput = form.querySelector('input[name="password"]');
    const btn = form.querySelector("button");

    emailInput.value = emailInput.value.toLowerCase().trim();

    if (passwordInput.value.length < 6) {
        e.preventDefault();
        errorBox.style.display = "block";
        errorBox.innerText = "Password must be at least 6 characters.";
        return;
    }

    btn.innerText = "Creating account...";
    btn.disabled = true;
});
</script>

</body>
</html>
